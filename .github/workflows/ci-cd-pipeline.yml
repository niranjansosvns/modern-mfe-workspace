name: Angular Micro-Frontend CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build Apps & Validate Artifacts
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Fixed property key name here
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Compile Shared Assets Library
      run: npm run build:shared

    - name: Compile Shell & Profile Production Apps
      run: |
        npm run build:shell
        npm run build:profile

    - name: Verify Dist Folders Output
      run: |
        ls -la dist/shell/browser
        ls -la dist/profile-mfe/browser

  build-docker-containers:
    name: Build & Verify Nginx Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Validate Shell Docker Build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.shell
        push: false
        tags: angular-mfe-shell:latest

    - name: Validate Remote Profile MFE Docker Build
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.profile
        push: false
        tags: angular-profile-mfe:latest
