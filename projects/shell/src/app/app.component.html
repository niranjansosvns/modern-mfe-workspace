<nav class="main-navbar">
  <div class="flex flex-col gap-1">
    <div class="logo">MFE State: {{ username() }}</div>
    
    <!-- Real-time Reactive Signal Monitor Output -->
    <span *ngIf="userService.liveFormState().email" class="text-[10px] text-sky-300 italic">
      Typing: {{ userService.liveFormState().email }}
    </span>
  </div>
  
  <div class="flex items-center gap-4">
    <!-- Dynamic Session Authentication Controller Toggle -->
    <button *ngIf="!userService.authToken()"
      [disabled]="!userService.liveFormState().isFormValid"
      [ngClass]="{
        'bg-emerald-500 hover:bg-emerald-600 opacity-100': userService.liveFormState().isFormValid,
        'bg-slate-500 opacity-50 cursor-not-allowed': !userService.liveFormState().isFormValid
      }"
      (click)="userService.login(); router.navigate(['/profile'])"
      class="px-3 py-1 text-sm font-semibold text-white rounded transition-all">
      Fast Login
    </button>
    <button *ngIf="userService.authToken()"
      (click)="userService.logout()"
      class="px-3 py-1 text-sm font-semibold bg-rose-500 text-white rounded hover:bg-rose-600 transition-all">
      Logout
    </button>
  </div>

  <ul class="nav-links">
    <li><a routerLink="/">Home (Shell)</a></li>
    <li><a routerLink="/profile">User Profile (Remote MFE)</a></li>
  </ul>
</nav>

<main class="content-viewport">
  <router-outlet></router-outlet>
</main>
